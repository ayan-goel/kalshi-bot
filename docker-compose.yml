services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kalshi
      POSTGRES_PASSWORD: kalshi_dev
      POSTGRES_DB: kalshi_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalshi -d kalshi_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
