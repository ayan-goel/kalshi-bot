[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "bot-service"
rootDirectory = "/"
port = 8080

[[services]]
name = "dashboard"
rootDirectory = "dashboard"
port = 3000
